<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weapon Ascension - RPG</title>
    <link rel="icon" href="UI Elements/UI Elements/Icons/Icon_01.png" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
      body {
        margin: 0;
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: 'Courier New', Courier, monospace;
      }
    </style>
  </head>
  <body>
    <script>
      const STORAGE_KEY = 'weapon-ascension-save-v1';

      const WEAPON_LIST = [
        { id: 'Sword', name: 'Sword', assetKey: 'YellowWarrior', baseDamage: 12, baseSpeed: 220, baseRange: 80, baseCrit: 0.08, baseCombo: 2, masteryMultiplier: 0.05, description: 'Fast close combat with fluid combos.' },
        { id: 'Bow', name: 'Bow', assetKey: 'BlueArcher', baseDamage: 10, baseSpeed: 210, baseRange: 240, baseCrit: 0.12, baseCombo: 1, masteryMultiplier: 0.04, description: 'Long range shots with precision hits.' },
        { id: 'Spear', name: 'Spear', assetKey: 'BlueLancer', baseDamage: 14, baseSpeed: 200, baseRange: 120, baseCrit: 0.06, baseCombo: 2, masteryMultiplier: 0.06, description: 'Piercing reach that dominates melee space.' },
        { id: 'Daggers', name: 'Daggers', assetKey: 'RedWarrior', baseDamage: 9, baseSpeed: 240, baseRange: 70, baseCrit: 0.16, baseCombo: 3, masteryMultiplier: 0.05, description: 'Rapid strikes and deadly critical bursts.' },
        { id: 'Greatsword', name: 'Greatsword', assetKey: 'BlackWarrior', baseDamage: 18, baseSpeed: 180, baseRange: 90, baseCrit: 0.05, baseCombo: 1, masteryMultiplier: 0.07, description: 'Heavy power swings with huge impact.' },
        { id: 'Magic Staff', name: 'Magic Staff', assetKey: 'PurpleMonk', baseDamage: 11, baseSpeed: 210, baseRange: 220, baseCrit: 0.1, baseCombo: 1, masteryMultiplier: 0.05, description: 'Elemental blasts and magical control.' },
      ];

      const WEAPON_VISUALS = {
        YellowWarrior: {
          prefix: 'YellowWarrior',
          assets: {
            idle: { path: 'Yellow Units/Warrior/Warrior_Idle.png', frameWidth: 192, frameHeight: 192 },
            run: { path: 'Yellow Units/Warrior/Warrior_Run.png', frameWidth: 192, frameHeight: 192 },
            attack1: { path: 'Yellow Units/Warrior/Warrior_Attack1.png', frameWidth: 192, frameHeight: 192 },
            attack2: { path: 'Yellow Units/Warrior/Warrior_Attack2.png', frameWidth: 192, frameHeight: 192 },
            guard: { path: 'Yellow Units/Warrior/Warrior_Guard.png', frameWidth: 192, frameHeight: 192 },
          },
          frames: { idle: 8, run: 6, attack1: 4, attack2: 4, guard: 6 },
          scale: 0.9,
        },
        BlackWarrior: {
          prefix: 'BlackWarrior',
          assets: {
            idle: { path: 'Black Units/Warrior/Warrior_Idle.png', frameWidth: 192, frameHeight: 192 },
            run: { path: 'Black Units/Warrior/Warrior_Run.png', frameWidth: 192, frameHeight: 192 },
            attack1: { path: 'Black Units/Warrior/Warrior_Attack1.png', frameWidth: 192, frameHeight: 192 },
            attack2: { path: 'Black Units/Warrior/Warrior_Attack2.png', frameWidth: 192, frameHeight: 192 },
            guard: { path: 'Black Units/Warrior/Warrior_Guard.png', frameWidth: 192, frameHeight: 192 },
          },
          frames: { idle: 8, run: 6, attack1: 4, attack2: 4, guard: 6 },
          scale: 0.9,
        },
        RedWarrior: {
          prefix: 'RedWarrior',
          assets: {
            idle: { path: 'Red Units/Warrior/Warrior_Idle.png', frameWidth: 192, frameHeight: 192 },
            run: { path: 'Red Units/Warrior/Warrior_Run.png', frameWidth: 192, frameHeight: 192 },
            attack1: { path: 'Red Units/Warrior/Warrior_Attack1.png', frameWidth: 192, frameHeight: 192 },
            attack2: { path: 'Red Units/Warrior/Warrior_Attack2.png', frameWidth: 192, frameHeight: 192 },
            guard: { path: 'Red Units/Warrior/Warrior_Guard.png', frameWidth: 192, frameHeight: 192 },
          },
          frames: { idle: 8, run: 6, attack1: 4, attack2: 4, guard: 6 },
          scale: 0.9,
        },
        BlueArcher: {
          prefix: 'BlueArcher',
          assets: {
            idle: { path: 'Blue Units/Archer/Archer_Idle.png', frameWidth: 192, frameHeight: 192 },
            run: { path: 'Blue Units/Archer/Archer_Run.png', frameWidth: 192, frameHeight: 192 },
            attack1: { path: 'Blue Units/Archer/Archer_Shoot.png', frameWidth: 192, frameHeight: 192 },
            attack2: { path: 'Blue Units/Archer/Archer_Shoot.png', frameWidth: 192, frameHeight: 192 },
          },
          frames: { idle: 6, run: 4, attack1: 8, attack2: 8 },
          scale: 0.85,
        },
        BlueLancer: {
          prefix: 'BlueLancer',
          assets: {
            idle: { path: 'Blue Units/Lancer/Lancer_Idle.png', frameWidth: 192, frameHeight: 320 },
            run: { path: 'Blue Units/Lancer/Lancer_Run.png', frameWidth: 192, frameHeight: 320 },
            attack1: { path: 'Blue Units/Lancer/Lancer_Right_Attack.png', frameWidth: 192, frameHeight: 320 },
            attack2: { path: 'Blue Units/Lancer/Lancer_Right_Attack.png', frameWidth: 192, frameHeight: 320 },
          },
          frames: { idle: 20, run: 10, attack1: 5, attack2: 5 },
          scale: 0.7,
        },
        PurpleMonk: {
          prefix: 'PurpleMonk',
          assets: {
            idle: { path: 'Purple Units/Monk/Idle.png', frameWidth: 192, frameHeight: 192 },
            run: { path: 'Purple Units/Monk/Run.png', frameWidth: 192, frameHeight: 192 },
            attack1: { path: 'Purple Units/Monk/Heal.png', frameWidth: 192, frameHeight: 192 },
            attack2: { path: 'Purple Units/Monk/Heal.png', frameWidth: 192, frameHeight: 192 },
          },
          frames: { idle: 6, run: 4, attack1: 11, attack2: 11 },
          scale: 0.85,
        },
      };

      const ENEMY_TYPES = [
        { id: 'Goblin', tint: 0x2d8a2d, health: 8, damage: 6, speed: 90, range: 40, goldMin: 5, goldMax: 12, material: 'Goblin Fang' },
        { id: 'Wolf', tint: 0x9b59b6, health: 10, damage: 8, speed: 110, range: 35, goldMin: 6, goldMax: 14, material: 'Wolf Hide' },
        { id: 'Skeleton', tint: 0xffffff, health: 12, damage: 10, speed: 80, range: 45, goldMin: 8, goldMax: 18, material: 'Bone Shard' },
        { id: 'Orc', tint: 0xff8c00, health: 16, damage: 12, speed: 70, range: 40, goldMin: 10, goldMax: 22, material: 'Orc Tooth' },
        { id: 'Slime', tint: 0x00ffff, health: 6, damage: 4, speed: 60, range: 30, goldMin: 3, goldMax: 9, material: 'Slime Gel' },
      ];

      let saveData = null;
      let hudText = null;
      let messageText = null;
      let currentAreaText = null;
      let animsCreated = false;

      function loadSaveData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return {
            currentWeapon: 'Sword',
            gold: 50,
            currentHealth: 200,
            maxHealth: 200,
            weaponProgress: WEAPON_LIST.reduce((acc, weapon) => { acc[weapon.id] = { level: 1, xp: 0 }; return acc; }, {}),
            inventory: { potions: 2, materials: {} },
            unlockedAreas: ['Training Grounds', 'Town'],
            enlightenmentUnlocked: false,
          };
        }
        try {
          const parsed = JSON.parse(raw);
          parsed.weaponProgress = parsed.weaponProgress || {};
          WEAPON_LIST.forEach((weapon) => {
            if (!parsed.weaponProgress[weapon.id]) {
              parsed.weaponProgress[weapon.id] = { level: 1, xp: 0 };
            }
          });
          parsed.currentWeapon = parsed.currentWeapon || 'Sword';
          parsed.currentHealth = parsed.currentHealth || 200;
          parsed.maxHealth = parsed.maxHealth || 200;
          parsed.gold = parsed.gold || 0;
          parsed.inventory = parsed.inventory || { potions: 2, materials: {} };
          parsed.unlockedAreas = parsed.unlockedAreas || ['Training Grounds', 'Town'];
          parsed.enlightenmentUnlocked = parsed.enlightenmentUnlocked || false;
          return parsed;
        } catch {
          localStorage.removeItem(STORAGE_KEY);
          return loadSaveData();
        }
      }

      function saveGame() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
      }

      function getWeaponDefinition(id) {
        return WEAPON_LIST.find((weapon) => weapon.id === id) || WEAPON_LIST[0];
      }

      function getWeaponProgress(id) {
        return saveData.weaponProgress[id] || { level: 1, xp: 0 };
      }

      function getCurrentWeapon() {
        return getWeaponDefinition(saveData.currentWeapon);
      }

      function getWeaponStats() {
        const weapon = getCurrentWeapon();
        const progress = getWeaponProgress(weapon.id);
        const levelFactor = 1 + (progress.level - 1) * weapon.masteryMultiplier;
        return {
          id: weapon.id,
          name: weapon.name,
          damage: Math.round(weapon.baseDamage * levelFactor),
          attackSpeed: Math.max(120, Math.round(weapon.baseSpeed - (progress.level - 1) * 3)),
          range: Math.round(weapon.baseRange + progress.level * 1.4),
          critChance: Math.min(0.35, weapon.baseCrit + progress.level * 0.002),
          comboLimit: Math.min(5, weapon.baseCombo + Math.floor(progress.level / 20)),
          level: progress.level,
          xp: progress.xp,
          xpToNext: 100 + progress.level * 20,
          description: weapon.description,
        };
      }

      function awardMasteryXP(amount) {
        const weapon = getCurrentWeapon();
        const progress = getWeaponProgress(weapon.id);
        progress.xp += amount;
        const threshold = 100 + progress.level * 20;
        if (progress.xp >= threshold && progress.level < 100) {
          progress.xp -= threshold;
          progress.level += 1;
          saveData.maxHealth += 5;
          saveData.currentHealth = Math.min(saveData.currentHealth + 20, saveData.maxHealth);
          showMessage(`${weapon.name} Mastery is now ${progress.level}!`, '#88ff88');
          if (progress.level === 100) {
            saveData.enlightenmentUnlocked = true;
            showMessage('Enlightenment Trials unlocked!', '#ffdd55');
          }
        }
        saveGame();
      }

      function getWeaponVisual(key) {
        return WEAPON_VISUALS[key] || WEAPON_VISUALS.YellowWarrior;
      }

      function loadWeaponAssets(scene) {
        Object.values(WEAPON_VISUALS).forEach((visual) => {
          Object.entries(visual.assets).forEach(([anim, data]) => {
            scene.load.spritesheet(`${visual.prefix}_${anim}`, data.path, { frameWidth: data.frameWidth, frameHeight: data.frameHeight });
          });
        });
        scene.load.spritesheet('enemy_run', 'Red Units/Warrior/Warrior_Run.png', { frameWidth: 192, frameHeight: 192 });
        scene.load.spritesheet('enemy_idle', 'Red Units/Warrior/Warrior_Idle.png', { frameWidth: 192, frameHeight: 192 });
        scene.load.image('water_bg', 'Terrain/Tileset/Water Background color.png');
        scene.load.image('tilemap_lush', 'Terrain/Tileset/Tilemap_color1.png');
        scene.load.image('tilemap_desert', 'Terrain/Tileset/Tilemap_color2.png');
        scene.load.image('shadow', 'Terrain/Tileset/Shadow.png');
        scene.load.image('camp_castle', 'Buildings/Blue Buildings/Castle.png');
        scene.load.image('camp_barracks', 'Buildings/Blue Buildings/Barracks.png');
        scene.load.image('camp_house1', 'Buildings/Blue Buildings/House1.png');
        scene.load.image('town_house2', 'Buildings/Blue Buildings/House2.png');
        scene.load.image('bush1', 'Terrain/Decorations/Bushes/Bushe1.png');
        scene.load.image('bush2', 'Terrain/Decorations/Bushes/Bushe2.png');
        scene.load.image('rock1', 'Terrain/Decorations/Rocks/Rock1.png');
        scene.load.image('rock2', 'Terrain/Decorations/Rocks/Rock2.png');
        scene.load.image('cloud1', 'Terrain/Decorations/Clouds/Clouds_01.png');
        scene.load.image('cloud2', 'Terrain/Decorations/Clouds/Clouds_06.png');
      }

      function createWeaponAnimations(scene) {
        if (animsCreated) return;
        Object.values(WEAPON_VISUALS).forEach((visual) => {
          Object.entries(visual.assets).forEach(([anim, _data]) => {
            const frames = visual.frames[anim] || visual.frames.idle;
            const repeat = anim.startsWith('attack') ? 0 : -1;
            const frameRate = anim === 'run' ? 12 : anim.startsWith('attack') ? 14 : 10;
            scene.anims.create({ key: `${visual.prefix}_${anim}`, frames: scene.anims.generateFrameNumbers(`${visual.prefix}_${anim}`, { start: 0, end: frames - 1 }), frameRate, repeat });
          });
        });
        scene.anims.create({ key: 'enemy_run', frames: scene.anims.generateFrameNumbers('enemy_run', { start: 0, end: 5 }), frameRate: 12, repeat: -1 });
        scene.anims.create({ key: 'enemy_idle', frames: scene.anims.generateFrameNumbers('enemy_idle', { start: 0, end: 5 }), frameRate: 8, repeat: -1 });
        animsCreated = true;
      }

      function createButton(scene, x, y, label, callback, width = 500) {
        const bg = scene.add.rectangle(x, y, width, 40, 0x111111).setStrokeStyle(2, 0xffffff).setInteractive({ useHandCursor: true });
        const txt = scene.add.text(x, y, label, { font: '16px Courier New', fill: '#ffffff', align: 'center', wordWrap: { width: width - 20 } }).setOrigin(0.5);
        bg.on('pointerover', () => bg.setFillStyle(0x333333));
        bg.on('pointerout', () => bg.setFillStyle(0x111111));
        bg.on('pointerdown', callback);
        return { bg, txt };
      }

      function createHUD(scene) {
        const panel = scene.add.rectangle(416, 34, 820, 64, 0x000000, 0.55).setStrokeStyle(2, 0xffffff);
        hudText = scene.add.text(24, 16, '', { font: '16px Courier New', fill: '#ffffff' }).setDepth(1000);
        currentAreaText = scene.add.text(24, 48, '', { font: '14px Courier New', fill: '#88ccff' }).setDepth(1000);
        messageText = scene.add.text(24, 520, '', { font: '16px Courier New', fill: '#ffdd55', wordWrap: { width: 780 } }).setDepth(1000);
        updateHUD();
      }

      function updateHUD(message) {
        if (!hudText) return;
        const weapon = getCurrentWeapon();
        const progress = getWeaponProgress(weapon.id);
        hudText.setText([`Weapon: ${weapon.name}   Mastery: ${progress.level}`, `XP: ${progress.xp}/${100 + progress.level * 20}   Gold: ${saveData.gold}`, `HP: ${Math.floor(saveData.currentHealth)}/${saveData.maxHealth}`]);
        if (message) showMessage(message);
      }

      function showMessage(text, color = '#ffdd55', duration = 2400) {
        if (!messageText) return;
        messageText.setText(text);
        messageText.setStyle({ fill: color });
        if (duration > 0) {
          setTimeout(() => { if (messageText) messageText.setText(''); }, duration);
        }
      }

      function setPlayerSprite(scene) {
        const weapon = getCurrentWeapon();
        const visual = getWeaponVisual(weapon.assetKey);
        scene.currentAssetPrefix = visual.prefix;
        scene.playerShadow = scene.add.image(220, 320, 'shadow').setAlpha(0.45).setScale(1.25);
        scene.player = scene.physics.add.sprite(220, 320, `${visual.prefix}_idle`).setCollideWorldBounds(true).setScale(visual.scale).setDepth(300);
        scene.player.body.setSize(40, 40);
        scene.player.body.setOffset(76, 80);
        scene.player.play(`${visual.prefix}_idle`);
      }

      function handlePlayerInput(scene, targets, onHit) {
        const stats = getWeaponStats();
        const player = scene.player;
        const shadow = scene.playerShadow;
        const controls = scene.controls;
        shadow.x = player.x;
        shadow.y = player.y + 35;
        player.setVelocity(0);
        const speed = Math.max(140, stats.attackSpeed * 0.75);

        if (controls.guard.isDown && !scene.isAttacking) {
          scene.isGuarding = true;
          player.play(`${scene.currentAssetPrefix}_guard`, true);
        } else {
          scene.isGuarding = false;
        }

        if (scene.isAttacking) {
          if (!scene.hasHit) {
            targets.forEach((target) => {
              if (!target.active) return;
              const dist = Phaser.Math.Distance.Between(player.x, player.y, target.x, target.y);
              if (dist <= stats.range) {
                const isToLeft = target.x < player.x;
                if ((player.flipX && isToLeft) || (!player.flipX && !isToLeft)) {
                  scene.hasHit = true;
                  onHit(target);
                }
              }
            });
          }
          return;
        }

        if (Phaser.Input.Keyboard.JustDown(controls.space) && !scene.isGuarding) {
          scene.isAttacking = true;
          scene.hasHit = false;
          player.play(`${scene.currentAssetPrefix}_attack${scene.currentCombo}`, true);
          return;
        }

        let moving = false;
        if (controls.cursors.left.isDown) { player.setVelocityX(-speed); player.setFlipX(true); moving = true; }
        else if (controls.cursors.right.isDown) { player.setVelocityX(speed); player.setFlipX(false); moving = true; }
        if (controls.cursors.up.isDown) { player.setVelocityY(-speed); moving = true; }
        else if (controls.cursors.down.isDown) { player.setVelocityY(speed); moving = true; }
        if (!scene.isGuarding) { if (moving) player.play(`${scene.currentAssetPrefix}_run`, true); else player.play(`${scene.currentAssetPrefix}_idle`, true); }
      }

      class BootScene extends Phaser.Scene {
        constructor() { super('BootScene'); }
        preload() { loadWeaponAssets(this); }
        create() {
          createWeaponAnimations(this);
          saveData = loadSaveData();
          if (!saveData.currentHealth) saveData.currentHealth = saveData.maxHealth;
          this.scene.start('MenuScene');
        }
      }

      class MenuScene extends Phaser.Scene {
        constructor() { super('MenuScene'); }
        create() {
          this.add.tileSprite(416, 320, 832, 640, 'water_bg');
          this.add.image(120, 100, 'cloud1').setAlpha(0.75).setScale(0.8);
          this.add.image(720, 110, 'cloud2').setAlpha(0.6).setScale(0.9).setFlipX(true);
          this.add.image(660, 450, 'camp_castle').setScale(0.45).setDepth(10);
          this.add.image(180, 520, 'camp_barracks').setScale(0.5).setDepth(8);
          this.add.image(520, 520, 'camp_house1').setScale(0.4).setDepth(9);
          this.add.rectangle(416, 120, 760, 160, 0x000000, 0.45).setStrokeStyle(2, 0xffffff);
          this.add.text(50, 70, 'WEAPON ASCENSION MENU', { font: '32px Courier New', fill: '#ffffff' });
          this.add.text(50, 110, 'Choose a weapon to master, then explore the world.', { font: '16px Courier New', fill: '#cccccc' });
          createHUD(this);
          currentAreaText.setText('Area: Menu');
          updateHUD();
          this.previewSprite = this.add.sprite(656, 250, 'YellowWarrior_idle').setScale(0.9).setDepth(100).setOrigin(0.5);
          this.previewSprite.play('YellowWarrior_idle');
          this.weaponDescription = this.add.text(430, 210, '', { font: '14px Courier New', fill: '#ffffff', wordWrap: { width: 400 } }).setDepth(100);
          this.weaponStats = this.add.text(430, 300, '', { font: '14px Courier New', fill: '#88ff88', wordWrap: { width: 400 } }).setDepth(100);

          WEAPON_LIST.forEach((weapon, index) => {
            const button = createButton(this, 416, 170 + index * 52, `${weapon.name} — ${weapon.description}`, () => {
              saveData.currentWeapon = weapon.id;
              saveGame();
              showMessage(`${weapon.name} selected.`, '#88ff88');
              this.updateWeaponPreview();
              updateHUD();
            }, 760);
            if (index === 0) button.bg.setFillStyle(0x333333);
          });

          this.zoneButtons = [
            createButton(this, 160, 520, 'Training Grounds', () => this.scene.start('TrainingScene'), 240),
            createButton(this, 420, 520, 'Town', () => this.scene.start('TownScene'), 240),
            createButton(this, 680, 520, 'Wilds', () => this.scene.start('WildsScene'), 240),
          ];
          createButton(this, 416, 580, 'Save Game', () => { saveGame(); showMessage('Progress saved.', '#88ff88'); }, 260);
          this.updateWeaponPreview();
        }

        updateWeaponPreview() {
          const weapon = getCurrentWeapon();
          const visual = getWeaponVisual(weapon.assetKey);
          this.previewSprite.setTexture(`${visual.prefix}_idle`);
          this.previewSprite.setScale(visual.scale);
          this.previewSprite.play(`${visual.prefix}_idle`);
          this.weaponDescription.setText(`${weapon.description}`);
          this.weaponStats.setText(`Damage: ${getWeaponStats().damage}   Speed: ${getWeaponStats().attackSpeed}   Range: ${getWeaponStats().range}`);
        }
      }

      class TrainingScene extends Phaser.Scene {
        constructor() { super('TrainingScene'); }
        create() {
          this.isAttacking = false;
          this.isGuarding = false;
          this.hasHit = false;
          this.currentCombo = 1;
          this.add.tileSprite(416, 320, 832, 640, 'water_bg');
          for (let col = 1; col < 12; col++) {
            for (let row = 1; row < 9; row++) {
              const tile = this.add.image(col * 64 + 32, row * 64 + 32, 'tilemap_lush');
              tile.setCrop(64, 64, 64, 64);
            }
          }
          this.obstacles = this.physics.add.staticGroup();
          this.obstacles.add(this.add.rectangle(416, 32, 832, 64));
          this.obstacles.add(this.add.rectangle(416, 608, 832, 64));
          this.obstacles.add(this.add.rectangle(32, 320, 64, 640));
          this.obstacles.add(this.add.rectangle(800, 320, 64, 640));
          this.add.image(420, 220, 'bush1').setScale(0.65).setDepth(5);
          this.add.image(540, 150, 'rock1').setScale(0.85).setDepth(5);
          this.add.image(220, 500, 'rock2').setScale(0.8).setDepth(5);
          this.trainingDummy = this.physics.add.staticImage(540, 360, 'tilemap_lush');
          this.trainingDummy.setCrop(320, 448, 64, 64);
          this.trainingDummy.setSize(48, 48).setOffset(8, 8);
          this.portal = this.physics.add.staticImage(110, 520, 'tilemap_lush');
          this.portal.setCrop(320, 320, 64, 64);
          this.physics.add.existing(this.portal, true);
          setPlayerSprite(this);
          this.physics.add.collider(this.player, this.obstacles);
          this.physics.add.overlap(this.player, this.portal, () => { this.scene.start('MenuScene'); showMessage('Returned to the menu.'); });
          this.controls = { cursors: this.input.keyboard.createCursorKeys(), space: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE), guard: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C) };
          this.player.on('animationcomplete', () => { this.isAttacking = false; this.hasHit = false; this.currentCombo = this.currentCombo === 1 ? 2 : 1; });
          createHUD(this);
          currentAreaText.setText('Area: Training Grounds');
          updateHUD('Train on the dummy to gain weapon mastery and small gold rewards.');
          createButton(this, 740, 560, 'Return', () => this.scene.start('MenuScene'), 160);
        }

        update() {
          handlePlayerInput(this, [this.trainingDummy], (dummy) => {
            awardMasteryXP(4);
            saveData.gold += 1;
            saveGame();
            showMessage('Training strike! +1 gold.');
            dummy.setTint(0x88ff88);
            this.time.delayedCall(120, () => dummy.clearTint());
          });
          this.player.setDepth(this.player.y);
          updateHUD();
        }
      }

      class TownScene extends Phaser.Scene {
        constructor() { super('TownScene'); }
        create() {
          this.isAttacking = false;
          this.isGuarding = false;
          this.hasHit = false;
          this.currentCombo = 1;
          this.add.tileSprite(416, 320, 832, 640, 'water_bg');
          for (let col = 1; col < 12; col++) {
            for (let row = 1; row < 9; row++) {
              const tile = this.add.image(col * 64 + 32, row * 64 + 32, 'tilemap_lush');
              tile.setCrop(64, 64, 64, 64);
            }
          }
          this.add.image(150, 180, 'camp_house1').setScale(0.65).setDepth(5);
          this.add.image(680, 210, 'town_house2').setScale(0.6).setDepth(5);
          this.add.image(420, 120, 'cloud1').setAlpha(0.65).setScale(0.85);
          setPlayerSprite(this);
          this.controls = { cursors: this.input.keyboard.createCursorKeys(), space: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE), guard: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C) };
          this.player.on('animationcomplete', () => { this.isAttacking = false; this.hasHit = false; this.currentCombo = this.currentCombo === 1 ? 2 : 1; });
          createHUD(this);
          currentAreaText.setText('Area: Town');
          updateHUD('Buy potions, sell materials, or heal at the inn.');
          createButton(this, 660, 180, 'Buy Potion (12G)', () => { if (saveData.gold >= 12) { saveData.gold -= 12; saveData.inventory.potions += 1; saveGame(); showMessage('Purchased potion.'); } else { showMessage('Not enough gold.', '#ff6666'); } updateHUD(); });
          createButton(this, 660, 240, 'Sell Materials', () => { const materials = saveData.inventory.materials; let total = 0; Object.keys(materials).forEach((mat) => { total += materials[mat] * 5; }); if (total > 0) { saveData.gold += total; saveData.inventory.materials = {}; saveGame(); showMessage(`Sold materials for ${total} gold.`); } else { showMessage('No materials to sell.', '#ff6666'); } updateHUD(); });
          createButton(this, 660, 300, 'Heal at Inn', () => { saveData.currentHealth = saveData.maxHealth; saveGame(); showMessage('Fully healed at the inn.'); updateHUD(); });
          createButton(this, 660, 360, 'Return', () => this.scene.start('MenuScene'), 160);
        }
        update() { handlePlayerInput(this, [], () => {}); this.player.setDepth(this.player.y); }
      }

      class WildsScene extends Phaser.Scene {
        constructor() { super('WildsScene'); }
        create() {
          this.isAttacking = false;
          this.isGuarding = false;
          this.hasHit = false;
          this.currentCombo = 1;
          this.add.tileSprite(416, 320, 832, 640, 'water_bg');
          for (let col = 1; col < 12; col++) {
            for (let row = 1; row < 9; row++) {
              const tile = this.add.image(col * 64 + 32, row * 64 + 32, 'tilemap_desert');
              tile.setCrop(64, 64, 64, 64);
            }
          }
          this.add.image(680, 120, 'cloud2').setAlpha(0.55).setScale(0.85);
          this.add.image(150, 90, 'cloud1').setAlpha(0.45).setScale(0.85);
          this.obstacles = this.physics.add.staticGroup();
          this.obstacles.add(this.add.rectangle(416, 32, 832, 64));
          this.obstacles.add(this.add.rectangle(416, 608, 832, 64));
          this.obstacles.add(this.add.rectangle(32, 320, 64, 640));
          this.obstacles.add(this.add.rectangle(800, 320, 64, 640));
          this.obstacles.add(this.add.rectangle(320, 180, 120, 30));
          this.obstacles.add(this.add.rectangle(520, 420, 90, 35));
          this.escapePortal = this.physics.add.staticImage(110, 520, 'tilemap_desert');
          this.escapePortal.setCrop(320, 320, 64, 64);
          this.physics.add.existing(this.escapePortal, true);
          setPlayerSprite(this);
          this.physics.add.collider(this.player, this.obstacles);
          this.physics.add.overlap(this.player, this.escapePortal, () => { this.scene.start('MenuScene'); showMessage('Escaped back to the menu.'); });
          this.enemies = this.physics.add.group();
          for (let i = 0; i < 4; i++) this.spawnEnemy();
          this.physics.add.collider(this.enemies, this.obstacles);
          this.controls = { cursors: this.input.keyboard.createCursorKeys(), space: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE), guard: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C) };
          this.player.on('animationcomplete', () => { this.isAttacking = false; this.hasHit = false; this.currentCombo = this.currentCombo === 1 ? 2 : 1; });
          createHUD(this);
          currentAreaText.setText('Area: Wilds');
          updateHUD('Wild enemies chase you. Defeat them for gold and materials.');
        }

        spawnEnemy() {
          const enemyType = Phaser.Utils.Array.GetRandom(ENEMY_TYPES);
          const enemy = this.enemies.create(Phaser.Math.Between(460, 760), Phaser.Math.Between(140, 500), 'enemy_run');
          enemy.setTint(enemyType.tint);
          enemy.originalTint = enemyType.tint;
          enemy.setSize(40, 40).setOffset(76, 80);
          enemy.health = enemyType.health;
          enemy.maxHealth = enemyType.health;
          enemy.damage = enemyType.damage;
          enemy.speed = enemyType.speed;
          enemy.range = enemyType.range;
          enemy.goldMin = enemyType.goldMin;
          enemy.goldMax = enemyType.goldMax;
          enemy.material = enemyType.material;
          enemy.enemyType = enemyType.id;
          enemy.lastAttack = 0;
          enemy.play('enemy_run');
          return enemy;
        }

        update(time) {
          this.enemies.getChildren().forEach((enemy) => {
            const distance = Phaser.Math.Distance.Between(enemy.x, enemy.y, this.player.x, this.player.y);
            if (distance < 260) {
              this.physics.moveToObject(enemy, this.player, enemy.speed);
              enemy.setFlipX(enemy.body.velocity.x < 0);
              if (distance < enemy.range + 10 && time > enemy.lastAttack + 1200) {
                enemy.lastAttack = time;
                if (this.isGuarding) {
                  showMessage('Blocked the strike!', '#88ddff');
                } else {
                  saveData.currentHealth = Math.max(0, saveData.currentHealth - enemy.damage);
                  saveGame();
                  updateHUD();
                  showMessage(`Hit by ${enemy.enemyType}! -${enemy.damage} HP`, '#ff6666');
                }
              }
            } else {
              enemy.setVelocity(0);
            }
          });
          handlePlayerInput(this, this.enemies.getChildren(), (enemy) => {
            if (!enemy.active) return;
            enemy.health -= 1;
            if (enemy.health <= 0) {
              const goldGain = Phaser.Math.Between(enemy.goldMin, enemy.goldMax);
              saveData.gold += goldGain;
              saveData.inventory.materials[enemy.material] = (saveData.inventory.materials[enemy.material] || 0) + 1;
              awardMasteryXP(10);
              saveData.currentHealth = Math.min(saveData.currentHealth + 2, saveData.maxHealth);
              saveGame();
              showMessage(`Defeated ${enemy.enemyType}! +${goldGain} gold.`);
              enemy.destroy();
              this.spawnEnemy();
              updateHUD();
              return;
            }
            enemy.setTint(0xff3333);
            this.time.delayedCall(120, () => { if (enemy.active) enemy.setTint(enemy.originalTint); });
          });
          if (saveData.currentHealth <= 0) {
            showMessage('You were defeated. Return to town to recover.', '#ff4444');
            this.player.setTint(0xff3333);
            this.player.setVelocity(0);
          }
          this.player.setDepth(this.player.y);
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: 832,
        height: 640,
        physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
        scene: [BootScene, MenuScene, TrainingScene, TownScene, WildsScene],
      };

      window.addEventListener('load', () => {
        saveData = loadSaveData();
        new Phaser.Game(config);
      });
    </script>
  </body>
</html>
